<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<meta name="description" content="Countdown timer to May 6, 2026">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon.svg">
<title>დათვლა 6 მაისამდე</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f172a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #e2e8f0;
  }
  .container { text-align: center; }
  h1 {
    font-size: 1.2rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: #94a3b8;
    margin-bottom: 2.5rem;
  }
  .units {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .unit {
    background: #1e293b;
    border-radius: 16px;
    padding: 1.8rem 2.2rem;
    min-width: 120px;
  }
  .unit .value {
    font-size: 3.5rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #f8fafc;
    line-height: 1;
  }
  .unit .label {
    margin-top: 0.5rem;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    color: #64748b;
  }
  .done {
    font-size: 2rem;
    color: #34d399;
    font-weight: 600;
  }
  #install-btn {
    margin-top: 2.5rem;
    padding: 0.75rem 2rem;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: background 0.2s;
  }
  #install-btn:hover {
    background: #2563eb;
  }
  #install-btn.hidden {
    display: none;
  }
</style>
</head>
<body>
<div class="container">
  <h1>დარჩენილი დრო 6 მაისამდე, 2026</h1>
  <div class="units" id="countdown"></div>
  <button id="install-btn" class="hidden">📲 Install App</button>
</div>
<script>
  const target = new Date('2026-05-06T00:00:00');
  const el = document.getElementById('countdown');

  function update() {
    const diff = target - Date.now();
    if (diff <= 0) {
      el.innerHTML = '<span class="done">6 მაისი დადგა!</span>';
      return;
    }
    const d = Math.floor(diff / 864e5);
    const h = Math.floor((diff % 864e5) / 36e5);
    const m = Math.floor((diff % 36e5) / 6e4);
    const s = Math.floor((diff % 6e4) / 1e3);

    el.innerHTML = [
      ['დღე', d], ['საათი', h], ['წუთი', m], ['წამი', s]
    ].map(([label, val]) =>
      `<div class="unit"><div class="value">${String(val).padStart(2,'0')}</div><div class="label">${label}</div></div>`
    ).join('');
  }

  update();
  setInterval(update, 1000);

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  let deferredPrompt;
  const installBtn = document.getElementById('install-btn');

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.classList.remove('hidden');
  });

  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBtn.classList.add('hidden');
  });

  window.addEventListener('appinstalled', () => {
    installBtn.classList.add('hidden');
    deferredPrompt = null;
  });
</script>
</body>
</html>
